  <style>
    body {
      margin: 0;
      padding: 18px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
      color: #111827;
      font-size: 13px;
    }
    .section { margin-bottom: 14px; }
    .title { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
    .hint { font-size: 12px; color: #4b5563; margin-bottom: 12px; white-space: pre-line; }
    button {
      padding: 11px 20px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: #4262ff;
      color: white;
      min-width: 160px;
    }
    button:disabled { opacity: 0.6; cursor: default; }
    #status {
      margin-top: 12px;
      font-size: 12px;
      color: #374151;
      white-space: pre-line;
    }
    #output {
      margin-top: 14px;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #f9fafb;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      max-height: 70vh;
      overflow: auto;
    }
  </style>
</head>
<body>
  <div class="section">
    <div class="title">Selection debug</div>
    <div class="hint">Select:
- main sticky
- frame labels
- inner type labels
- frames
- images
- SD stickers

Then click the button. The panel will show what it thinks each object is.</div>
    <button id="debugBtn">Analyze selection</button>
    <div id="status"></div>
    <div id="output"></div>
  </div>

  <script>
    function htmlToText(value) {
      if (!value) return '';
      const div = document.createElement('div');
      div.innerHTML = value;
      return (div.textContent || div.innerText || '').trim();
    }

    function normalizeName(text) {
      return String(text || '')
        .trim()
        .toLowerCase()
        .replace(/<[^>]*>/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function getItemText(item) {
      const candidates = [
        item.plainText,
        item.text,
        item.title,
        item.content,
        item.data && item.data.content,
        item.data && item.data.text,
        item.data && item.data.title
      ];

      for (const candidate of candidates) {
        if (!candidate) continue;
        const txt = htmlToText(String(candidate));
        if (txt) return txt;
      }
      return '';
    }

    function getRect(item) {
      const x = item.x ?? (item.position && item.position.x) ?? 0;
      const y = item.y ?? (item.position && item.position.y) ?? 0;
      const width = item.width ?? (item.geometry && item.geometry.width) ?? 0;
      const height = item.height ?? (item.geometry && item.geometry.height) ?? 0;

      return {
        x, y, width, height,
        left: x - width / 2,
        right: x + width / 2,
        top: y - height / 2,
        bottom: y + height / 2,
        cx: x,
        cy: y
      };
    }

    function pointInRect(x, y, rect) {
      return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
    }

    function rectContainsCenter(rect, item, pad = 0) {
      const r = getRect(item);
      return pointInRect(
        r.cx,
        r.cy,
        {
          left: rect.left - pad,
          right: rect.right + pad,
          top: rect.top - pad,
          bottom: rect.bottom + pad
        }
      );
    }

    function verticalOverlap(a, b) {
      const overlap = Math.max(0, Math.min(a.bottom, b.bottom) - Math.max(a.top, b.top));
      const minH = Math.max(1, Math.min(a.height, b.height));
      return overlap / minH;
    }

    function area(item) {
      const r = getRect(item);
      return r.width * r.height;
    }

    function formatItem(item) {
      const r = getRect(item);
      return {
        id: item.id,
        type: item.type,
        text: getItemText(item),
        x: Math.round(r.x),
        y: Math.round(r.y),
        width: Math.round(r.width),
        height: Math.round(r.height),
        left: Math.round(r.left),
        right: Math.round(r.right),
        top: Math.round(r.top),
        bottom: Math.round(r.bottom)
      };
    }

    function findMainSticky(labels, frames) {
      const outside = labels.filter(label => {
        return !frames.some(frame => rectContainsCenter(getRect(frame), label, 10));
      });

      if (!outside.length) return null;

      return [...outside].sort((a, b) => {
        const ra = getRect(a);
        const rb = getRect(b);
        if (Math.abs(ra.top - rb.top) > 1) return ra.top - rb.top;
        return area(b) - area(a);
      })[0];
    }

    function findFrameLabelCandidates(frame, labels) {
      const fr = getRect(frame);
      const maxGap = Math.max(260, fr.width * 0.5);

      return labels
        .map(label => {
          const lr = getRect(label);
          const txt = normalizeName(getItemText(label));
          if (!txt || txt === 'sd') return null;

          const leftGap = fr.left - lr.right;
          const isLeft = leftGap >= -20 && leftGap <= maxGap;
          if (!isLeft) return null;

          const overlap = verticalOverlap(fr, lr);
          const verticalDistance = Math.abs(fr.cy - lr.cy);
          const score = leftGap * 2 + verticalDistance - overlap * 100;

          return {
            label,
            score,
            leftGap: Math.round(leftGap),
            verticalDistance: Math.round(verticalDistance),
            overlap: Number(overlap.toFixed(2))
          };
        })
        .filter(Boolean)
        .sort((a, b) => a.score - b.score);
    }

    function findInnerLabelCandidates(frame, labels) {
      const fr = getRect(frame);
      const pad = Math.max(16, Math.min(fr.width, fr.height) * 0.02);

      return labels
        .map(label => {
          const lr = getRect(label);
          const txt = normalizeName(getItemText(label));
          if (!txt) return null;

          const inside =
            lr.cx >= fr.left - pad &&
            lr.cx <= fr.left + fr.width * 0.40 &&
            lr.cy >= fr.top - pad &&
            lr.cy <= fr.bottom + pad;

          if (!inside) return null;

          const reasonableWidth = lr.width <= fr.width * 0.40;
          const reasonableHeight = lr.height <= fr.height * 0.28;

          if (!reasonableWidth || !reasonableHeight) return null;

          return {
            label,
            text: txt,
            left: Math.round(lr.left),
            top: Math.round(lr.top),
            width: Math.round(lr.width),
            height: Math.round(lr.height),
            area: Math.round(lr.width * lr.height),
            isSd: txt === 'sd'
          };
        })
        .filter(Boolean)
        .sort((a, b) => a.top - b.top);
    }

    function findFrameForImage(image, frames) {
      return frames.find(frame => rectContainsCenter(getRect(frame), image, 4)) || null;
    }

    function findNearestInnerLabelForImage(image, innerLabels, frame) {
      const ir = getRect(image);
      const fr = getRect(frame);

      const typeLabels = innerLabels.filter(x => !x.isSd);

      const prepared = typeLabels.map((entry, index) => {
        const sr = getRect(entry.label);
        const next = typeLabels[index + 1];
        const nextRect = next ? getRect(next.label) : null;

        const lowerBound = nextRect
          ? nextRect.top - Math.max(nextRect.height * 0.12, 10)
          : fr.bottom;

        const imageIsHorizontallyRight = ir.cx >= sr.right - 10;
        const imageWithinVerticalBand = ir.cy >= sr.top - sr.height * 0.10 && ir.cy <= lowerBound;

        const distance = Math.abs(ir.cy - sr.cy) * 2 + Math.max(0, sr.right - ir.cx) * 3;

        return {
          entry,
          lowerBound: Math.round(lowerBound),
          imageIsHorizontallyRight,
          imageWithinVerticalBand,
          distance: Math.round(distance)
        };
      });

      const strict = prepared
        .filter(x => x.imageIsHorizontallyRight && x.imageWithinVerticalBand)
        .sort((a, b) => a.distance - b.distance);

      if (strict.length) return strict[0];

      const fallback = prepared
        .filter(x => x.imageIsHorizontallyRight)
        .sort((a, b) => a.distance - b.distance);

      return fallback[0] || null;
    }

    function imageHasSd(image, sdLabels) {
      const ir = getRect(image);
      const expand = Math.max(12, Math.min(ir.width, ir.height) * 0.18);

      const expanded = {
        left: ir.left - expand,
        right: ir.right + expand,
        top: ir.top - expand,
        bottom: ir.bottom + expand
      };

      return sdLabels.some(sd => {
        const sr = getRect(sd.label);
        return pointInRect(sr.cx, sr.cy, expanded);
      });
    }

    function print(obj) {
      return JSON.stringify(obj, null, 2);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const statusEl = document.getElementById('status');
      const outputEl = document.getElementById('output');
      const btn = document.getElementById('debugBtn');

      function setStatus(text) {
        console.log('[SelectionDebug]', text);
        statusEl.textContent = text;
      }

      btn.addEventListener('click', async () => {
        btn.disabled = true;
        outputEl.textContent = '';
        try {
          setStatus('Reading selection...');
          const selection = await miro.board.getSelection();

          if (!selection.length) {
            setStatus('Nothing selected.');
            btn.disabled = false;
            return;
          }

          const frames = selection.filter(item => item.type === 'frame');
          const labels = selection.filter(item =>
            item.type === 'sticky_note' ||
            item.type === 'sticker' ||
            item.type === 'shape' ||
            item.type === 'text'
          );
          const images = selection.filter(item => item.type === 'image');

          const debug = {
            summary: {
              total: selection.length,
              frames: frames.length,
              labels: labels.length,
              images: images.length
            },
            mainSticky: null,
            frames: []
          };

          const mainSticky = findMainSticky(labels, frames);
          debug.mainSticky = mainSticky ? formatItem(mainSticky) : null;

          for (const frame of frames) {
            const fr = getRect(frame);
            const outsideLabels = labels.filter(label => !rectContainsCenter(fr, label, 8));
            const frameLabelCandidates = findFrameLabelCandidates(frame, outsideLabels);
            const chosenFrameLabel = frameLabelCandidates.length ? frameLabelCandidates[0].label : null;

            const innerLabels = findInnerLabelCandidates(frame, labels);
            const sdLabels = innerLabels.filter(x => x.isSd);
            const typeLabels = innerLabels.filter(x => !x.isSd);

            const imagesInFrame = images.filter(img => rectContainsCenter(fr, img, 2));

            const frameBlock = {
              frame: formatItem(frame),
              chosenFrameLabel: chosenFrameLabel ? formatItem(chosenFrameLabel) : null,
              frameLabelCandidates: frameLabelCandidates.slice(0, 8).map(x => ({
                item: formatItem(x.label),
                score: x.score,
                leftGap: x.leftGap,
                verticalDistance: x.verticalDistance,
                overlap: x.overlap
              })),
              innerLabels: innerLabels.map(x => ({
                item: formatItem(x.label),
                isSd: x.isSd
              })),
              imagesInFrame: []
            };

            for (const img of imagesInFrame) {
              const nearest = findNearestInnerLabelForImage(img, innerLabels, frame);
              frameBlock.imagesInFrame.push({
                image: formatItem(img),
                nearestInnerLabel: nearest ? {
                  item: formatItem(nearest.entry.label),
                  lowerBound: nearest.lowerBound,
                  imageIsHorizontallyRight: nearest.imageIsHorizontallyRight,
                  imageWithinVerticalBand: nearest.imageWithinVerticalBand,
                  distance: nearest.distance
                } : null,
                hasSd: imageHasSd(img, sdLabels)
              });
            }

            debug.frames.push(frameBlock);
          }

          console.log('[SelectionDebug] full debug', debug);
          outputEl.textContent = print(debug);
          setStatus('Done. Open console too: full debug object is printed there.');
        } catch (e) {
          console.error(e);
          setStatus('Error: ' + (e.message || e));
          outputEl.textContent = String(e.stack || e);
        } finally {
          btn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
