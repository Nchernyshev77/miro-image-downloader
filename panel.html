  <style>

<body>
  <div class="card">

      </div>

    <div class="section">

    <div class="progress-container">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel"></div>
    </div>

    <div id="status"></div>

  <script>
    const TOKEN_STORAGE_KEY = 'miro-image-downloader-access-token';
    const HEADER_RAY_MAX_DISTANCE = 15000;
    const HEADER_RAY_SIDE_PAD = 320;

    function htmlToText(value) {
      if (!value) return '';
      const div = document.createElement('div');
      div.innerHTML = value;
      return (div.textContent || div.innerText || '').trim();
    }

    function normalizeName(text) {
      return String(text || '')
        .trim()
        .replace(/<[^>]*>/g, '')
        .replace(/\s*,\s*/g, ' __SLASH__ ')
        .replace(/\s*[\/\\]\s*/g, ', ')
        .replace(/[:*?"<>|]+/g, ' ')
        .replace(/__SLASH__/g, '/')
        .replace(/\s*,\s*/g, ', ')
        .replace(/\s*\/\s*/g, ' / ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function sanitizePart(text, fallback = 'item') {
      const n = normalizeName(text);
      return n || fallback;
    }

    function getTextKey(text) {
      return normalizeName(text).toLowerCase();
    }

    function isDashOnlyName(text) {
      const compact = String(text || '').replace(/\s+/g, '');
      return /^(?:-|–|—)+$/.test(compact);
    }

    function buildStructuredBase(parts) {
      return parts.filter(part => String(part || '').trim()).join('_');
    }

    function extractBaseNameFromUrl(url) {
      try {
        const u = new URL(url);
        const file = (u.pathname.split('/').pop() || '').trim();
        if (!file) return '';
        return decodeURIComponent(file.replace(/\.[^/.]+$/, ''));
      } catch (e) {
        return '';
      }
    }

    function extractNameFromMetadata(metadata) {
      if (!metadata || typeof metadata !== 'object') return '';
      for (const key of Object.keys(metadata)) {
        const ns = metadata[key];
        if (!ns || typeof ns !== 'object') continue;
        const candidate = (ns.fileName || ns.filename || ns.imageName || ns.name || ns.title || '').trim();
        if (candidate) return candidate;
      }
      return '';
    }

    function getItemText(item) {
      const candidates = [
        item.plainText,
        item.text,
        item.title,
        item.content,
        item.data && item.data.content,
        item.data && item.data.text,
        item.data && item.data.title
      ];
      for (const candidate of candidates) {
        if (!candidate) continue;
        const txt = htmlToText(String(candidate));
        if (txt) return txt;
      }
      return '';
    }

    function isSticky(item) {
      return item.type === 'sticky_note';
    }

    function pointInRect(x, y, rect) {
      return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
    }

    function expandRect(rect, padX, padY = padX) {
      return {
        left: rect.left - padX,
        right: rect.right + padX,
        top: rect.top - padY,
        bottom: rect.bottom + padY
      };
    }

    function rectOverlapArea(a, b) {
      const overlapX = Math.max(0, Math.min(a.right, b.right) - Math.max(a.left, b.left));
      const overlapY = Math.max(0, Math.min(a.bottom, b.bottom) - Math.max(a.top, b.top));
      return overlapX * overlapY;
    }

    function horizontalOverlap(a, b) {
      return Math.max(0, Math.min(a.right, b.right) - Math.max(a.left, b.left));
    }

    function verticalDistanceToRect(y, rect) {
      if (y < rect.top) return rect.top - y;
      if (y > rect.bottom) return y - rect.bottom;
      return 0;
    }

    function horizontalDistanceToRect(x, rect) {
      if (x < rect.left) return rect.left - x;
      if (x > rect.right) return x - rect.right;
      return 0;
    }

    function distancePointToRect(x, y, rect) {
      const dx = horizontalDistanceToRect(x, rect);
      const dy = verticalDistanceToRect(y, rect);
      return Math.hypot(dx, dy);
    }

    function flattenItems(items) {
      const byId = new Map();

      function add(item) {
        if (!item || !item.id || byId.has(item.id)) return;
        byId.set(item.id, item);

        const nestedCandidates = [
          item.children,
          item.items
        ];

        for (const nested of nestedCandidates) {
          if (Array.isArray(nested)) {
            nested.forEach(add);
          }
        }
      }

      items.forEach(add);
      return Array.from(byId.values());
    }

    async function collectSelectedItems() {
      const selection = await miro.board.getSelection();
      return flattenItems(selection);
    }

    async function collectNamingItems(selectedItems) {
      const byId = new Map(selectedItems.map(item => [item.id, item]));
      const selectedFrames = selectedItems.filter(item => item.type === 'frame');

      for (const frame of selectedFrames) {
        if (typeof frame.getChildren !== 'function') continue;

        try {
          const children = await frame.getChildren();
          for (const child of flattenItems(children)) {
            if (!byId.has(child.id)) {
              byId.set(child.id, child);
            }
          }
        } catch (error) {
          console.warn('[ImageDownloader] failed to load frame children', frame.id, error);
        }
      }

      return Array.from(byId.values());
    }

    function createGeometry(items) {
      const itemsById = new Map(items.map(item => [item.id, item]));
      const rectCache = new Map();

      function getNumber(value, fallback = 0) {
        const number = Number(value);
        return Number.isFinite(number) ? number : fallback;
      }

      function resolve(itemOrId) {
        if (!itemOrId) return null;
        return typeof itemOrId === 'string' ? itemsById.get(itemOrId) || null : itemOrId;
      }

      function getRect(itemOrId) {
        const item = resolve(itemOrId);
        if (!item) {
          return {
            x: 0, y: 0, width: 0, height: 0,
            left: 0, right: 0, top: 0, bottom: 0,
            cx: 0, cy: 0, area: 0
          };
        }

        if (rectCache.has(item.id)) {
          return rectCache.get(item.id);
        }

        const width = getNumber(item.width ?? (item.geometry && item.geometry.width), 0);
        const height = getNumber(item.height ?? (item.geometry && item.geometry.height), 0);

        let x = getNumber(item.x ?? (item.position && item.position.x), 0);
        let y = getNumber(item.y ?? (item.position && item.position.y), 0);

        if (item.relativeTo === 'parent_top_left' && item.parentId && itemsById.has(item.parentId)) {
          const parentRect = getRect(item.parentId);
          x = parentRect.left + x;
          y = parentRect.top + y;
        } else if (item.relativeTo === 'parent_center' && item.parentId && itemsById.has(item.parentId)) {
          const parentRect = getRect(item.parentId);
          x = parentRect.cx + x;
          y = parentRect.cy + y;
        }

        const rect = {
          x,
          y,
          width,
          height,
          left: x - width / 2,
          right: x + width / 2,
          top: y - height / 2,
          bottom: y + height / 2,
          cx: x,
          cy: y,
          area: width * height
        };

        rectCache.set(item.id, rect);
        return rect;
      }

      return { itemsById, getRect };
    }

    function sortImagesForNumbering(images, geometry) {
      return [...images].sort((a, b) => {
        const ra = geometry.getRect(a);
        const rb = geometry.getRect(b);
        const rowThreshold = Math.max(10, Math.min(ra.height, rb.height) * 0.35);
        if (Math.abs(ra.top - rb.top) > rowThreshold) return ra.top - rb.top;
        return ra.left - rb.left;
      });
    }

    function pickContainingOrNearestFrame(item, frames, geometry) {
      if (!frames.length) return null;

      if (item.parentId) {
        const directParent = frames.find(frame => frame.id === item.parentId);
        if (directParent) return directParent;
      }

      const itemRect = geometry.getRect(item);

      const overlapMatches = frames
        .map(frame => {
          const fr = geometry.getRect(frame);
          const overlap = rectOverlapArea(itemRect, fr);
          const overlapRatio = overlap / Math.max(1, itemRect.area);
          const centerInside = pointInRect(itemRect.cx, itemRect.cy, expandRect(fr, 20));
          return { frame, overlap, overlapRatio, centerInside, frameArea: fr.area };
        })
        .filter(match => match.overlap > 0 || match.centerInside)
        .sort((a, b) => {
          if (Math.abs(b.overlapRatio - a.overlapRatio) > 0.0001) return b.overlapRatio - a.overlapRatio;
          if (Math.abs(b.overlap - a.overlap) > 1) return b.overlap - a.overlap;
          return a.frameArea - b.frameArea;
        });

      if (overlapMatches.length) {
        return overlapMatches[0].frame;
      }

      const containing = frames
        .filter(frame => pointInRect(itemRect.cx, itemRect.cy, expandRect(geometry.getRect(frame), 20)))
        .sort((a, b) => geometry.getRect(a).area - geometry.getRect(b).area);

      if (containing.length) return containing[0];

      return [...frames]
        .map(frame => {
          const fr = geometry.getRect(frame);
          return { frame, distance: distancePointToRect(itemRect.cx, itemRect.cy, fr) };
        })
        .sort((a, b) => a.distance - b.distance)[0].frame;
    }

    function findColumnHeaderStickyForFrame(frame, stickies, frames, geometry) {
      const candidates = stickies
        .map(sticky => {
          const score = getColumnHeaderScore(frame, sticky, frames, geometry);
          return score == null || !Number.isFinite(score) ? null : { sticky, score };
        })
        .filter(Boolean)
        .sort((a, b) => a.score - b.score);

      return candidates.length ? candidates[0].sticky : null;
    }

    function findFrameLabelSticky(frame, stickies, excludedIds, geometry) {
      const fr = geometry.getRect(frame);

      const candidates = stickies
        .filter(sticky => !excludedIds.has(sticky.id))
        .map(sticky => {
          const text = sanitizePart(getItemText(sticky), '');
          const textKey = getTextKey(getItemText(sticky));
          if (!text || textKey === 'sd') return null;
          if (sticky.parentId === frame.id) return null;

          const sr = geometry.getRect(sticky);
          if (pointInRect(sr.cx, sr.cy, expandRect(fr, 10))) return null;

          const gap = fr.left - sr.right;
          if (gap < -60 || gap > Math.max(500, fr.width * 1.1)) return null;

          const overlapY = Math.max(0, Math.min(fr.bottom, sr.bottom) - Math.max(fr.top, sr.top));
          const verticalPenalty = overlapY > 0 ? 0 : verticalDistanceToRect(sr.cy, fr);
          if (verticalPenalty > Math.max(500, fr.height * 0.55)) return null;

          const score = gap * 2 + verticalPenalty - overlapY * 0.1 - sr.area * 0.01;
          return { sticky, score };
        })
        .filter(Boolean)
        .sort((a, b) => a.score - b.score);

      return candidates.length ? candidates[0].sticky : null;
    }


    function getFrameLabelScore(frame, sticky, geometry) {
      const fr = geometry.getRect(frame);
      const sr = geometry.getRect(sticky);
      const text = sanitizePart(getItemText(sticky), '');
      const textKey = getTextKey(getItemText(sticky));

      if (!text || textKey === 'sd') return null;
      if (sticky.parentId === frame.id) return null;
      if (pointInRect(sr.cx, sr.cy, expandRect(fr, 10))) return null;

      const gap = fr.left - sr.right;
      if (gap < -60 || gap > Math.max(620, fr.width * 1.35)) return null;

      const overlapY = Math.max(0, Math.min(fr.bottom, sr.bottom) - Math.max(fr.top, sr.top));
      const verticalPenalty = overlapY > 0 ? 0 : verticalDistanceToRect(sr.cy, fr);
      if (verticalPenalty > Math.max(620, fr.height * 0.75)) return null;

      return gap * 2 + verticalPenalty - overlapY * 0.15 - sr.area * 0.01;
    }

    function getColumnHeaderScore(frame, sticky, frames, geometry) {
      const fr = geometry.getRect(frame);
      const sr = geometry.getRect(sticky);
      const text = sanitizePart(getItemText(sticky), '');
      const textKey = getTextKey(getItemText(sticky));

      if (!text || textKey === 'sd') return null;
      if (sticky.parentId) return null;
      if (pointInRect(sr.cx, sr.cy, expandRect(fr, 20))) return null;

      const insideAnotherFrame = frames.some(otherFrame => {
        if (otherFrame.id === frame.id) return false;
        return pointInRect(sr.cx, sr.cy, expandRect(geometry.getRect(otherFrame), 20));
      });
      if (insideAnotherFrame) return null;

      const gapTop = fr.top - sr.bottom;
      if (gapTop < -60 || gapTop > HEADER_RAY_MAX_DISTANCE) return null;

      const rayLeft = sr.left - HEADER_RAY_SIDE_PAD;
      const rayRight = sr.right + HEADER_RAY_SIDE_PAD;
      const overlap = Math.max(0, Math.min(fr.right, rayRight) - Math.max(fr.left, rayLeft));
      const overlapRatio = overlap / Math.max(1, fr.width);
      const centerInside = fr.cx >= rayLeft && fr.cx <= rayRight;
      const dx = centerInside ? 0 : Math.min(Math.abs(fr.cx - rayLeft), Math.abs(fr.cx - rayRight));

      if (!centerInside && overlapRatio < 0.18) return null;

      return gapTop * 0.35 + dx * 0.15 - overlap * 0.04 - sr.area * 0.002;
    }

    function assignUniqueStickiesToFrames(frames, stickies, scoreFn) {
      const scoredPairs = [];

      for (const frame of frames) {
        for (const sticky of stickies) {
          const score = scoreFn(frame, sticky);
          if (score == null || !Number.isFinite(score)) continue;
          scoredPairs.push({ frameId: frame.id, stickyId: sticky.id, sticky, score });
        }
      }

      scoredPairs.sort((a, b) => a.score - b.score);

      const assignedFrames = new Set();
      const assignedStickies = new Set();
      const byFrameId = new Map();

      for (const pair of scoredPairs) {
        if (assignedFrames.has(pair.frameId)) continue;
        if (assignedStickies.has(pair.stickyId)) continue;
        assignedFrames.add(pair.frameId);
        assignedStickies.add(pair.stickyId);
        byFrameId.set(pair.frameId, pair.sticky);
      }

      return byFrameId;
    }

    function isItemInsideFrame(item, frame, geometry, pad = 20) {
      const ir = geometry.getRect(item);
      const fr = geometry.getRect(frame);
      if (item.parentId === frame.id) return true;
      return pointInRect(ir.cx, ir.cy, expandRect(fr, pad));
    }

    function findInnerTypeStickies(frame, allStickies, excludedIds, geometry) {
      const fr = geometry.getRect(frame);

      return allStickies
        .filter(sticky => {
          if (excludedIds.has(sticky.id)) return false;

          const text = sanitizePart(getItemText(sticky), '');
          const textKey = getTextKey(getItemText(sticky));
          if (!text || textKey === 'sd') return false;
          if (!isItemInsideFrame(sticky, frame, geometry, 25)) return false;

          const sr = geometry.getRect(sticky);
          if (sr.left > fr.left + fr.width * 0.55) return false;
          if (sr.width > fr.width * 0.6) return false;
          if (sr.height > fr.height * 0.3) return false;

          return true;
        })
        .sort((a, b) => {
          const ra = geometry.getRect(a);
          const rb = geometry.getRect(b);
          if (Math.abs(ra.top - rb.top) > 8) return ra.top - rb.top;
          return ra.left - rb.left;
        });
    }

    function findSdStickies(frame, allStickies, excludedIds, geometry) {
      return allStickies.filter(sticky => {
        if (excludedIds.has(sticky.id)) return false;

        const textKey = getTextKey(getItemText(sticky));
        if (textKey !== 'sd') return false;

        return isItemInsideFrame(sticky, frame, geometry, 80);
      });
    }

    function getImagesForFrame(frame, images, geometry) {
      const fr = geometry.getRect(frame);
      const expandedFrame = expandRect(fr, Math.max(100, fr.width * 0.04), Math.max(120, fr.height * 0.08));

      return images.filter(img => {
        if (img.parentId === frame.id) return true;
        const ir = geometry.getRect(img);
        return pointInRect(ir.cx, ir.cy, expandedFrame) || rectOverlapArea(ir, fr) > 0;
      });
    }

    function buildTypeZonesForFrame(frame, typeStickies, geometry) {
      const fr = geometry.getRect(frame);

      return typeStickies.map((sticky, index) => {
        const sr = geometry.getRect(sticky);
        const nextRect = typeStickies[index + 1] ? geometry.getRect(typeStickies[index + 1]) : null;
        const topPad = Math.max(12, sr.height * 0.15);
        const nextPad = nextRect ? Math.max(12, nextRect.height * 0.15) : 0;

        const top = Math.max(fr.top, sr.top - topPad);
        let bottom = nextRect ? Math.min(fr.bottom, nextRect.top - nextPad) : fr.bottom;

        if (bottom < top + 12) {
          bottom = nextRect ? Math.min(fr.bottom, (sr.bottom + nextRect.top) / 2) : fr.bottom;
        }

        return {
          sticky,
          zone: {
            left: Math.max(fr.left, sr.left),
            right: fr.right,
            top,
            bottom
          }
        };
      });
    }

    function assignImageToTypeByZone(image, zones, geometry) {
      const ir = geometry.getRect(image);

      const candidates = zones
        .map(zone => {
          if (ir.right < zone.zone.left) return null;

          const overlapArea = rectOverlapArea(ir, zone.zone);
          const centerInside = pointInRect(ir.cx, ir.cy, zone.zone);

          if (!overlapArea && !centerInside) return null;

          const score =
            overlapArea +
            (centerInside ? Math.max(1, ir.area * 0.15) : 0) +
            Math.max(0, ir.right - zone.zone.left);

          return { zone, score };
        })
        .filter(Boolean)
        .sort((a, b) => b.score - a.score);

      return candidates.length ? candidates[0].zone : null;
    }

    function imageHasSd(image, sdStickies, geometry) {
      const ir = geometry.getRect(image);
      const expandedImage = expandRect(
        ir,
        Math.max(18, ir.width * 0.04),
        Math.max(18, ir.height * 0.04)
      );

      return sdStickies.some(sd => {
        const sr = geometry.getRect(sd);
        const expandedSd = expandRect(
          sr,
          Math.max(10, sr.width * 0.18),
          Math.max(10, sr.height * 0.18)
        );

        return (
          pointInRect(sr.cx, sr.cy, expandedImage) ||
          pointInRect(ir.cx, ir.cy, expandedSd) ||
          rectOverlapArea(expandedImage, expandedSd) > 0
        );
      });
    }

    async function getDownloadMeta(boardId, imageId, accessToken) {
      const metaResp = await fetch(`https://api.miro.com/v2/boards/${boardId}/items/${imageId}`, {
        headers: { 'Accept': 'application/json', 'Authorization': 'Bearer ' + accessToken.trim() }
      });
      if (!metaResp.ok) {
        const txt = await metaResp.text();
        if (metaResp.status === 401) {
          throw new Error('401 unauthorized: paste your current working Miro token into the token field');
        }
        throw new Error(`meta error ${metaResp.status}: ${txt}`);
      }

      const metaJson = await metaResp.json();
      const imageUrl = metaJson?.data?.imageUrl;
      if (!imageUrl) throw new Error('no imageUrl in data');

      const urlObj = new URL(imageUrl);
      urlObj.searchParams.set('format', 'original');
      urlObj.searchParams.set('redirect', 'false');

      const resourceResp = await fetch(urlObj.toString(), {
        headers: { 'Accept': 'application/json', 'Authorization': 'Bearer ' + accessToken.trim() }
      });
      if (!resourceResp.ok) {
        const txt = await resourceResp.text();
        if (resourceResp.status === 401) {
          throw new Error('401 unauthorized: paste your current working Miro token into the token field');
        }
        throw new Error(`resource error ${resourceResp.status}: ${txt}`);
      }

      const resourceJson = await resourceResp.json();
      const downloadUrl = resourceJson.url;
      if (!downloadUrl) throw new Error('no url in resource response');

      return { metaJson, imageUrl, downloadUrl };
    }

    function buildStructuredContext(namingItems, selectedImages) {
      const geometry = createGeometry(namingItems);
      const frames = namingItems.filter(item => item.type === 'frame');
      const stickies = namingItems.filter(isSticky);

      const selectedImagesByFrameId = new Map();
      for (const image of selectedImages) {
        const owner = pickContainingOrNearestFrame(image, frames, geometry);
        if (!owner) continue;
        if (!selectedImagesByFrameId.has(owner.id)) {
          selectedImagesByFrameId.set(owner.id, []);
        }
        selectedImagesByFrameId.get(owner.id).push(image);
      }

      const insideFrameById = new Map();
      for (const frame of frames) {
        const frameInside = stickies.filter(sticky => {
          if (sticky.parentId === frame.id) return true;
          return isItemInsideFrame(sticky, frame, geometry, 25);
        });
        insideFrameById.set(frame.id, frameInside);
      }

      const outsideStickies = stickies.filter(sticky => {
        return !frames.some(frame => (insideFrameById.get(frame.id) || []).some(candidate => candidate.id === sticky.id));
      });

      const nonSdOutsideStickies = outsideStickies.filter(sticky => {
        const text = sanitizePart(getItemText(sticky), '');
        const textKey = getTextKey(getItemText(sticky));
        return !!text && textKey !== 'sd';
      });

      const headerStickies = nonSdOutsideStickies.filter(sticky => {
        return frames.some(frame => getColumnHeaderScore(frame, sticky, frames, geometry) != null);
      });

      const preassignedColumnHeaders = new Map();
      for (const frame of frames) {
        const rankedHeaders = headerStickies
          .map(sticky => ({
            sticky,
            score: getColumnHeaderScore(frame, sticky, frames, geometry)
          }))
          .filter(item => item.score != null && Number.isFinite(item.score))
          .sort((a, b) => a.score - b.score);

        if (rankedHeaders.length) {
          preassignedColumnHeaders.set(frame.id, rankedHeaders[0].sticky);
        }
      }

      const usedHeaderIds = new Set(Array.from(preassignedColumnHeaders.values()).map(sticky => sticky.id));
      const frameLabelStickies = nonSdOutsideStickies.filter(sticky => !usedHeaderIds.has(sticky.id));

      const preassignedFrameLabels = assignUniqueStickiesToFrames(
        frames,
        frameLabelStickies,
        (frame, sticky) => getFrameLabelScore(frame, sticky, geometry)
      );

      const frameContextsById = new Map();

      for (const frame of frames) {
        const insideStickies = insideFrameById.get(frame.id) || [];
        const selectedImagesForFrame = selectedImagesByFrameId.get(frame.id) || [];

        let columnSticky = preassignedColumnHeaders.get(frame.id) || null;
        if (!columnSticky) {
          columnSticky = findColumnHeaderStickyForFrame(frame, headerStickies, frames, geometry);
        }

        const excludedIds = new Set();
        if (columnSticky) excludedIds.add(columnSticky.id);

        let frameLabel = preassignedFrameLabels.get(frame.id) || null;
        if (!frameLabel) {
          const frameLabelCandidates = frameLabelStickies.filter(sticky => !excludedIds.has(sticky.id));
          frameLabel = findFrameLabelSticky(frame, frameLabelCandidates, excludedIds, geometry);
        }

        if (frameLabel) excludedIds.add(frameLabel.id);

        const strictTypeStickies = findInnerTypeStickies(frame, insideStickies, excludedIds, geometry);
        const relaxedTypeStickies = insideStickies
          .filter(sticky => {
            if (excludedIds.has(sticky.id)) return false;
            const text = sanitizePart(getItemText(sticky), '');
            const textKey = getTextKey(getItemText(sticky));
            if (!text || textKey === 'sd') return false;

            const fr = geometry.getRect(frame);
            const sr = geometry.getRect(sticky);
            if (sr.left > fr.left + fr.width * 0.78) return false;
            if (sr.width > fr.width * 0.88) return false;
            if (sr.height > fr.height * 0.38) return false;
            return true;
          })
          .sort((a, b) => {
            const ra = geometry.getRect(a);
            const rb = geometry.getRect(b);
            if (Math.abs(ra.top - rb.top) > 8) return ra.top - rb.top;
            return ra.left - rb.left;
          });

        const typeStickies = strictTypeStickies.length ? strictTypeStickies : relaxedTypeStickies;
        const sdStickies = findSdStickies(frame, insideStickies, excludedIds, geometry);

        frameContextsById.set(frame.id, {
          frame,
          columnSticky,
          frameLabel,
          insideStickies,
          outsideStickies,
          typeStickies,
          sdStickies,
          selectedImages: selectedImagesForFrame
        });
      }

      return {
        geometry,
        frames,
        stickies,
        selectedImages,
        frameContextsById
      };
    }

    function buildStructuredNameData(context, image, startIndex, indexWithinSelection) {
      const { geometry, frames, selectedImages, frameContextsById } = context;

      const targetFrame = pickContainingOrNearestFrame(image, frames, geometry);
      if (!targetFrame) {
        return {
          base: 'group_frame_item',
          number: String(startIndex + indexWithinSelection).padStart(3, '0'),
          hasSd: false,
          debug: {
            reason: 'frame_not_found',
            imageId: image.id
          }
        };
      }

      const frameContext = frameContextsById.get(targetFrame.id) || null;
      const columnSticky = frameContext ? frameContext.columnSticky : null;
      const frameLabel = frameContext ? frameContext.frameLabel : null;
      const typeStickies = frameContext ? frameContext.typeStickies : [];
      const sdStickies = frameContext ? frameContext.sdStickies : [];
      const selectedImagesForFrame = frameContext ? frameContext.selectedImages : getImagesForFrame(targetFrame, selectedImages, geometry);

      const mainName = sanitizePart(columnSticky ? getItemText(columnSticky) : '', 'group');
      const frameName = sanitizePart(frameLabel ? getItemText(frameLabel) : '', 'frame');

      if (!typeStickies.length) {
        const sortedFallback = sortImagesForNumbering(selectedImagesForFrame.length ? selectedImagesForFrame : [image], geometry);
        const idxFallback = Math.max(0, sortedFallback.findIndex(img => img.id === image.id));

        return {
          base: buildStructuredBase([mainName, frameName, 'item']),
          number: String(startIndex + idxFallback).padStart(3, '0'),
          hasSd: imageHasSd(image, sdStickies, geometry),
          debug: {
            reason: 'inner_sticky_not_found',
            imageId: image.id,
            frameId: targetFrame.id,
            columnStickyId: columnSticky ? columnSticky.id : null,
            frameLabelId: frameLabel ? frameLabel.id : null,
            selectedImagesForFrame: selectedImagesForFrame.length,
            innerStickyCount: 0
          }
        };
      }

      const zones = buildTypeZonesForFrame(targetFrame, typeStickies, geometry);
      const assignedZone = assignImageToTypeByZone(image, zones, geometry);
      const innerStickyText = assignedZone ? getItemText(assignedZone.sticky) : '';
      const innerName = isDashOnlyName(innerStickyText)
        ? ''
        : sanitizePart(innerStickyText, 'item');
      const hasSd = imageHasSd(image, sdStickies, geometry);

      const imagesForGroup = assignedZone
        ? selectedImagesForFrame.filter(img => {
            const zone = assignImageToTypeByZone(img, zones, geometry);
            return zone && zone.sticky.id === assignedZone.sticky.id;
          })
        : selectedImagesForFrame;

      const sortedGroup = sortImagesForNumbering(imagesForGroup.length ? imagesForGroup : selectedImagesForFrame, geometry);
      const idx = Math.max(0, sortedGroup.findIndex(img => img.id === image.id));
      const number = String(startIndex + idx).padStart(3, '0');

      return {
        base: buildStructuredBase([mainName, frameName, innerName]),
        number,
        hasSd,
        debug: {
          reason: assignedZone ? 'ok' : 'zone_not_found',
          imageId: image.id,
          frameId: targetFrame.id,
          columnStickyId: columnSticky ? columnSticky.id : null,
          frameLabelId: frameLabel ? frameLabel.id : null,
          innerStickyId: assignedZone ? assignedZone.sticky.id : null,
          selectedImagesForFrame: selectedImagesForFrame.length,
          innerStickyCount: typeStickies.length
        }
      };
    }

    document.addEventListener('DOMContentLoaded', () => {
      const statusEl = document.getElementById('status');
      const btn = document.getElementById('downloadBtn');
      const nameModeMiro = document.getElementById('nameModeMiro');
      const nameModeCustom = document.getElementById('nameModeCustom');
      const nameModeStructured = document.getElementById('nameModeStructured');
      const baseNameRow = document.getElementById('baseNameRow');
      const baseNameInput = document.getElementById('baseName');
      const prefixInput = document.getElementById('prefixInput');
      const suffixInput = document.getElementById('suffixInput');
      const tokenInput = document.getElementById('tokenInput');
      const showToken = document.getElementById('showToken');
      const startIndexInput = document.getElementById('startIndex');
      const progressFill = document.getElementById('progressFill');
      const progressLabel = document.getElementById('progressLabel');

      function loadStoredToken() {
        try {
          return localStorage.getItem(TOKEN_STORAGE_KEY) || '';
        } catch (error) {
          return '';
        }
      }

      function saveStoredToken(token) {
        try {
          const cleanToken = String(token || '').trim();
          if (cleanToken) {
            localStorage.setItem(TOKEN_STORAGE_KEY, cleanToken);
          } else {
            localStorage.removeItem(TOKEN_STORAGE_KEY);
          }
        } catch (error) {
          console.warn('[ImageDownloader] failed to persist token', error);
        }
      }

      function getAccessToken() {
        return String(tokenInput.value || '').trim();
      }

      function updateNameModeVisibility() {
        baseNameRow.style.display = nameModeCustom.checked ? 'flex' : 'none';
      }

      nameModeMiro.addEventListener('change', updateNameModeVisibility);
      nameModeCustom.addEventListener('change', updateNameModeVisibility);
      nameModeStructured.addEventListener('change', updateNameModeVisibility);
      updateNameModeVisibility();

      tokenInput.value = loadStoredToken();
      tokenInput.addEventListener('input', () => {
        saveStoredToken(tokenInput.value);
      });

      showToken.addEventListener('change', () => {
        tokenInput.type = showToken.checked ? 'text' : 'password';
      });

      function resetProgress() {
        progressFill.style.width = '0%';
        progressLabel.textContent = '';
      }

      function setProgress(current, total) {
        if (!total) return;
        const safeCurrent = Math.min(Math.max(current, 0), total);
        const percent = Math.round((safeCurrent / total) * 100);
        progressFill.style.width = percent + '%';
        progressLabel.textContent = `${safeCurrent}/${total}`;
      }

      function setStatus(text, type = 'normal') {
        console.log('[ImageDownloader]', text);
        statusEl.textContent = text;
        statusEl.classList.remove('status-ok', 'status-error');
        if (type === 'ok') statusEl.classList.add('status-ok');
        if (type === 'error') statusEl.classList.add('status-error');
      }

      async function downloadSelectedImages() {
        btn.disabled = true;
        resetProgress();

        try {
          const accessToken = getAccessToken();
          if (!accessToken) {
            setStatus('Paste your Miro token into the token field.', 'error');
            resetProgress();
            return;
          }

          saveStoredToken(accessToken);
          setStatus('Reading board info...');
          const boardInfo = await miro.board.getInfo();
          const boardId = boardInfo.id;

          const selectedItems = await collectSelectedItems();
          if (!selectedItems.length) {
            setStatus('No items selected on the board.', 'error');
            return;
          }

          const selectedImages = selectedItems.filter(item => item.type === 'image');
          if (!selectedImages.length) {
            setStatus('Selection does not contain image items.', 'error');
            return;
          }

          const useMiroNames = nameModeMiro.checked;
          const useStructuredNames = nameModeStructured.checked;

          const baseNameRaw = baseNameInput.value.trim();
          const prefixRaw = prefixInput.value.trim();
          const suffixRaw = suffixInput.value.trim();
          const startIndex = parseInt(startIndexInput.value, 10) || 1;

          const prefix = normalizeName(prefixRaw);
          const suffix = normalizeName(suffixRaw);
          const baseName = sanitizePart(baseNameRaw, 'image');

          let structuredContext = null;
          if (useStructuredNames) {
            const namingItems = await collectNamingItems(selectedItems);
            structuredContext = buildStructuredContext(namingItems, selectedImages);

            console.log('[ImageDownloader] structured context', {
              selectedItems: selectedItems.length,
              namingItems: namingItems.length,
              frames: structuredContext.frames.length,
              stickies: structuredContext.stickies.length,
              selectedImages: selectedImages.length
            });
          }

          const total = selectedImages.length;
          setStatus(`Found ${total} images. Fetching data from REST API...`);
          setProgress(0, total);

          const downloaded = [];
          const errors = [];

          for (let i = 0; i < total; i++) {
            const img = selectedImages[i];
            const prefixLabel = `(${i + 1}/${total}) [${img.id}]`;

            try {
              setStatus(`${prefixLabel} Preparing file...`);
              const { metaJson, imageUrl, downloadUrl } = await getDownloadMeta(boardId, img.id, accessToken);

              const fileResp = await fetch(downloadUrl);
              if (!fileResp.ok) {
                const txt = await fileResp.text();
                throw new Error(`download error ${fileResp.status}: ${txt}`);
              }

              const blob = await fileResp.blob();
              const blobUrl = URL.createObjectURL(blob);

              const extFromType = (() => {
                const ct = fileResp.headers.get('Content-Type') || '';
                if (ct.includes('jpeg')) return 'jpg';
                if (ct.includes('png')) return 'png';
                if (ct.includes('gif')) return 'gif';
                if (ct.includes('svg')) return 'svg';
                if (ct.includes('webp')) return 'webp';
                return 'bin';
              })();

              let finalName = '';

              if (useStructuredNames) {
                const structured = buildStructuredNameData(structuredContext, img, startIndex, i);
                console.log('[ImageDownloader] structured naming', structured.debug);

                const parts = [];
                if (prefix) parts.push(prefix);
                parts.push(structured.base);
                if (suffix) parts.push(suffix);
                if (structured.hasSd) parts.push('sd');
                parts.push(structured.number);
                finalName = parts.filter(Boolean).join('_');
              } else if (useMiroNames) {
                const nameFromMetadata = extractNameFromMetadata(metaJson.metadata || {});
                const title = (metaJson.title && metaJson.title.trim()) || '';
                const urlBaseName = extractBaseNameFromUrl(downloadUrl) || extractBaseNameFromUrl(imageUrl);
                const junkNames = ['original', 'image'];
                const miroNameRaw = nameFromMetadata || title || urlBaseName || '';
                const miroName = junkNames.includes(String(miroNameRaw).toLowerCase()) ? '' : sanitizePart(miroNameRaw, '');
                const fallbackName = `${baseName}_${String(startIndex + i).padStart(3, '0')}`;

                const parts = [];
                if (prefix) parts.push(prefix);
                parts.push(miroName || fallbackName);
                if (suffix) parts.push(suffix);
                finalName = parts.filter(Boolean).join('_');
              } else {
                const num = String(startIndex + i).padStart(3, '0');
                const parts = [];
                if (prefix) parts.push(prefix);
                parts.push(baseName);
                if (suffix) parts.push(suffix);
                parts.push(num);
                finalName = parts.filter(Boolean).join('_');
              }

              const fileName = `${finalName}.${extFromType}`;
              const a = document.createElement('a');
              a.href = blobUrl;
              a.download = fileName;
              document.body.appendChild(a);
              a.click();
              a.remove();
              URL.revokeObjectURL(blobUrl);
              downloaded.push(fileName);
            } catch (e) {
              console.error('Unexpected error for image', img.id, e);
              errors.push(`${prefixLabel} ${e.message || 'unexpected error'}`);
            } finally {
              setProgress(i + 1, total);
            }
          }

          if (downloaded.length) {
            let msg = `Done. Downloaded ${downloaded.length} files.`;
            if (errors.length) msg += '\nSome errors:\n' + errors.join('\n');
            setStatus(msg, errors.length ? 'error' : 'ok');
          } else {
            let msg = 'Failed to download any images.';
            if (errors.length) msg += '\nDetails:\n' + errors.join('\n');
            setStatus(msg, 'error');
          }
        } catch (err) {
          console.error('Fatal error:', err);
          setStatus('Unexpected error (see panel console): ' + (err.message || err), 'error');
        } finally {
          btn.disabled = false;
        }
      }

      setStatus('Paste token, select images on the board and click Download.');
      resetProgress();
      console.log('[ImageDownloader] panel loaded');
      btn.addEventListener('click', () => {
        console.log('[ImageDownloader] button clicked');
        downloadSelectedImages();
      });
    });
  </script>
